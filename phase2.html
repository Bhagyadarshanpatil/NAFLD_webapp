<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phase 2: Ultrasound Diagnosis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Clean layout */
    body { background: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
    .container { max-width: 800px; margin: 40px auto; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .nav-header h2 { margin: 0; color: #1e293b; }
    .tag { background: #e0e7ff; color: #4338ca; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }

    .info-box { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
    .info-row { display: flex; gap: 30px; margin-top: 10px; color: #475569; font-size: 0.95rem; }

    .upload-area { border: 2px dashed #cbd5e1; padding: 30px; text-align: center; border-radius: 12px; margin-top: 20px; cursor: pointer; transition: 0.2s; }
    .upload-area:hover { border-color: #6366f1; background: #f5f7ff; }
    
    .preview-box { display: flex; justify-content: center; margin-top: 20px; min-height: 10px; }
    
    .btn-add { background: #4f46e5; color: white; width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; margin-top: 20px; cursor: pointer; }
    .btn-add:hover { background: #4338ca; }

    .result-display { margin-top: 25px; padding: 20px; background: #ecfdf5; border: 1px solid #6ee7b7; border-radius: 10px; color: #064e3b; text-align: center; display: none; }

    .flow-controls { display: flex; justify-content: space-between; margin-top: 40px; border-top: 1px solid #e2e8f0; padding-top: 20px; }
    .btn-outline { color: #64748b; text-decoration: none; font-weight: 600; }
    .btn-next { background: #111827; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; visibility: hidden; }
  </style>
</head>
<body>

  <script type="module" src="js/firebase.js"></script>

  <div class="container">
    <div class="nav-header">
      <h2>Phase 2: Ultrasound Analysis</h2>
      <span class="tag">CNN + FFT Model</span>
    </div>

    <!-- Patient Summary -->
    <div class="info-box">
      <h3 id="p-name" style="margin:0; font-size:1.2rem; color:#1e293b;">Loading...</h3>
      <div class="info-row">
        <span id="p-age">Age: --</span>
        <span id="p-gender">Gender: --</span>
      </div>
      <hr style="border:0; border-top:1px solid #e2e8f0; margin:15px 0;">
      <div class="info-row">
        <span id="p-nafld" style="font-weight:600;">Phase 1: --</span>
        <span id="p-risk" style="color:#dc2626; font-weight:600;">Risk: --</span>
      </div>
    </div>

    <!-- Upload Section -->
    <label style="font-weight:700; color:#334155;">Upload Ultrasound Image (B-Mode)</label>
    
    <div class="upload-area" onclick="document.getElementById('imageInput').click()">
        <p style="margin:0; color:#64748b;">Click to select file</p>
        <input type="file" id="imageInput" accept="image/*" style="display:none;">
    </div>
    
    <div id="previewBox" class="preview-box"></div>

    <button onclick="analyzeUltrasound()" class="btn-add">Run Diagnosis</button>

    <div id="stageResult" class="result-display"></div>

    <!-- Navigation -->
    <div class="flow-controls">
      <a id="link-back" href="#" class="btn-outline">← Back to Patient Details</a>
      <a id="link-phase3" href="#" class="btn-next">Next: Phase 3 (Future Risk) →</a>
    </div>
  </div>

  <script type="module" src="js/phase2.js"></script>

  <script>
    // URL Logic
    const params = new URLSearchParams(window.location.search);
    const pid = params.get("patientId");
    
    // Back to Patient Details
    if(pid) {
      document.getElementById("link-back").href = `patient-detail.html?id=${pid}`;
    }
  </script>
</body>
</html>
